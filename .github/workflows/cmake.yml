name: CMake

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check license headers and attribution
        run: python3 tests/check_license_headers.py

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DPREFOS_BUILD_TESTING=ON
          -DPREFOS_ENABLE_CUDA=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  installed-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and install PreFOS
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DPREFOS_ENABLE_CUDA=OFF
          cmake --build build --parallel
          cmake --install build --prefix "$PWD/install"

      - name: Build downstream consumer
        run: |
          cmake -S tests/cmake_consumer -B consumer-build \
            -DCMAKE_PREFIX_PATH="$PWD/install"
          cmake --build consumer-build --parallel
          ctest --test-dir consumer-build --output-on-failure
